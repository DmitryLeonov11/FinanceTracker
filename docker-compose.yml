services:
  postgres:
    image: postgres:16-alpine
    container_name: financetracker-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - financetracker_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - financetracker-net

  migrator:
    build:
      context: .
      dockerfile: src/FinanceTracker.Api/Dockerfile.migrator
    image: financetracker-migrator:local
    container_name: financetracker-migrator
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
    command: ["--connection", "Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"]
    networks:
      - financetracker-net

  api:
    build:
      context: .
      dockerfile: src/FinanceTracker.Api/Dockerfile
    image: financetracker-api:local
    container_name: financetracker-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      Jwt__Issuer: ${JWT_ISSUER:-FinanceTracker}
      Jwt__Audience: ${JWT_AUDIENCE:-FinanceTracker.Clients}
      Jwt__SigningKey: ${JWT_SIGNING_KEY}
      Jwt__AccessTokenMinutes: ${JWT_ACCESS_MINUTES:-15}
      Jwt__RefreshTokenDays: ${JWT_REFRESH_DAYS:-14}
      Cors__Origins__0: ${CORS_ORIGIN:-http://localhost:5173}
      AllowedHosts: ${ALLOWED_HOSTS:-localhost;127.0.0.1;api}
    ports:
      - "${API_HOST_PORT:-5050}:8080"
    networks:
      - financetracker-net

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
        VITE_SENTRY_DSN: ${VITE_SENTRY_DSN:-}
    image: financetracker-web:local
    container_name: financetracker-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    ports:
      - "${WEB_HOST_PORT:-5173}:80"
    networks:
      - financetracker-net

volumes:
  financetracker_pgdata:

networks:
  financetracker-net:
    driver: bridge
