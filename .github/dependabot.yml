version: 2
updates:
  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '07:00'
    open-pull-requests-limit: 5
    labels: [dependencies, ci]
    commit-message:
      prefix: ci

  # .NET
  - package-ecosystem: nuget
    directory: /src/FinanceTracker.Api
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels: [dependencies, backend]
    commit-message:
      prefix: deps
      include: scope
    groups:
      ef-core:
        patterns:
          - 'Microsoft.EntityFrameworkCore*'
          - 'Npgsql*'
      aspnet:
        patterns:
          - 'Microsoft.AspNetCore.*'

  - package-ecosystem: nuget
    directory: /src/FinanceTracker.Application
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    labels: [dependencies, backend]
    commit-message:
      prefix: deps

  - package-ecosystem: nuget
    directory: /src/FinanceTracker.Infrastructure
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    labels: [dependencies, backend]
    commit-message:
      prefix: deps

  # Frontend
  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 8
    labels: [dependencies, frontend]
    commit-message:
      prefix: deps
      include: scope
    groups:
      vue:
        patterns:
          - 'vue*'
          - '@vue/*'
          - 'pinia'
          - 'vue-router'
      tanstack:
        patterns:
          - '@tanstack/*'
      tailwind:
        patterns:
          - 'tailwindcss'
          - '@tailwindcss/*'
      vite:
        patterns:
          - 'vite'
          - 'vite-*'
          - '@vitejs/*'
      types:
        patterns:
          - '@types/*'

  # Docker base images
  - package-ecosystem: docker
    directory: /src/FinanceTracker.Api
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    labels: [dependencies, docker]
    commit-message:
      prefix: docker

  - package-ecosystem: docker
    directory: /web
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    labels: [dependencies, docker]
    commit-message:
      prefix: docker
