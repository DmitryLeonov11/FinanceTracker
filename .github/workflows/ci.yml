name: CI
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend · build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Cache NuGet
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore src/FinanceTracker.Api/FinanceTracker.Api.csproj

      - name: Build
        run: >-
          dotnet build src/FinanceTracker.Api/FinanceTracker.Api.csproj
          --no-restore
          --configuration Release
          /p:TreatWarningsAsErrors=true

      # Включить когда появятся тесты:
      # - name: Test
      #   run: dotnet test --no-build --configuration Release --verbosity normal

  frontend:
    name: Frontend · typecheck + build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install
        run: npm ci --no-audit --no-fund

      - name: Type-check
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: /api

      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist
          retention-days: 7

  docker:
    name: Docker · build images
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [backend, frontend]
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            context: .
            dockerfile: src/FinanceTracker.Api/Dockerfile
          - name: migrator
            context: .
            dockerfile: src/FinanceTracker.Api/Dockerfile.migrator
          - name: web
            context: ./web
            dockerfile: web/Dockerfile
    steps:
      - uses: actions/checkout@v6

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          load: false
          tags: financetracker-${{ matrix.name }}:ci
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,scope=${{ matrix.name }},mode=max
