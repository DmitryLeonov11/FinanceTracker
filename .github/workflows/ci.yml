name: CI
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend · build & test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Cache NuGet
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore FinanceTracker.slnx

      - name: Build
        run: >-
          dotnet build FinanceTracker.slnx
          --no-restore
          --configuration Release
          /p:TreatWarningsAsErrors=true

      - name: Test
        run: >-
          dotnet test FinanceTracker.slnx
          --no-build
          --configuration Release
          --logger "console;verbosity=normal"
          --logger "trx"
          --results-directory test-results
          --collect:"XPlat Code Coverage"

      - name: Render test report
        if: always()
        uses: dorny/test-reporter@v3
        with:
          name: .NET tests
          path: test-results/**/*.trx
          reporter: dotnet-trx
          fail-on-error: true

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: |
            test-results/**/*.trx
            test-results/**/coverage.cobertura.xml
          retention-days: 14

  frontend:
    name: Frontend · typecheck + build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install
        run: npm ci --no-audit --no-fund

      - name: Type-check
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: /api

      - name: Upload bundle
        uses: actions/upload-artifact@v7
        with:
          name: web-dist
          path: web/dist
          retention-days: 7

  docs:
    name: Docs · markdownlint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Lint markdown
        uses: DavidAnson/markdownlint-cli2-action@v20
        with:
          globs: |
            README.md
            ROADMAP.md
            .github/**/*.md
          config: .markdownlint.json

  workflows:
    name: Workflows · actionlint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Lint workflows
        uses: raven-actions/actionlint@v2
        with:
          files: .github/workflows/*.yml

  docker:
    name: Docker · build images
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [backend, frontend]
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            context: .
            dockerfile: src/FinanceTracker.Api/Dockerfile
          - name: migrator
            context: .
            dockerfile: src/FinanceTracker.Api/Dockerfile.migrator
          - name: web
            context: ./web
            dockerfile: web/Dockerfile
    steps:
      - uses: actions/checkout@v6

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build ${{ matrix.name }}
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          load: false
          tags: financetracker-${{ matrix.name }}:ci
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,scope=${{ matrix.name }},mode=max

  summary:
    name: CI · summary
    runs-on: ubuntu-latest
    if: always()
    needs: [backend, frontend, docs, workflows, docker]
    steps:
      - name: Aggregate
        run: |
          BACKEND="${{ needs.backend.result }}"
          FRONTEND="${{ needs.frontend.result }}"
          DOCS="${{ needs.docs.result }}"
          WORKFLOWS="${{ needs.workflows.result }}"
          DOCKER="${{ needs.docker.result }}"
          {
            echo "## CI summary"
            echo ""
            echo "| Job | Result |"
            echo "|---|---|"
            echo "| Backend  | $BACKEND |"
            echo "| Frontend | $FRONTEND |"
            echo "| Docs     | $DOCS |"
            echo "| Workflows| $WORKFLOWS |"
            echo "| Docker   | $DOCKER |"
          } >> "$GITHUB_STEP_SUMMARY"

          fail=0
          for r in "$BACKEND" "$FRONTEND" "$DOCS" "$WORKFLOWS" "$DOCKER"; do
            if [ "$r" != "success" ] && [ "$r" != "skipped" ]; then
              fail=1
            fi
          done
          exit $fail
